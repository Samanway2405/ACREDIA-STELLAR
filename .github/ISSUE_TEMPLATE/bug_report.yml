name: Bug or Setup Issue
description: Report a reproducible bug, setup problem, or stale setup documentation.
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: dropdown
    id: issue-label
    attributes:
      label: Required issue label
      description: Choose the closest primary label for this report.
      options:
        - bug
        - setup
        - docs
        - regression
        - security
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Required area label
      description: Choose the project area that is most affected.
      options:
        - frontend
        - contracts
        - database
        - ci
        - docs
        - security
    validations:
      required: true
  - type: textarea
    id: affected-paths
    attributes:
      label: Affected file paths
      description: List exact files or folders. Use repository-relative paths.
      placeholder: |
        frontend/src/lib/contracts.ts
        frontend/sql/secure_rls_migration.sql
        contracts/src/lib.rs
        README.md
    validations:
      required: true
  - type: textarea
    id: clean-clone-setup
    attributes:
      label: Clean-clone setup steps
      description: Paste the exact commands and env setup you used from a clean clone. Include any deviations from README.md.
      placeholder: |
        git clone https://github.com/Soumen1080/ACREDIA-STELLAR.git
        cd ACREDIA-STELLAR/frontend
        npm ci
        cp .env.local.example .env.local
        # filled NEXT_PUBLIC_SUPABASE_URL, NEXT_PUBLIC_SUPABASE_ANON_KEY, ...
        npm run dev
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Write the smallest complete steps needed to reproduce the issue.
      placeholder: |
        1. Start the app with npm run dev
        2. Open /dashboard
        3. Connect Freighter on testnet
        4. Click ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead? Include errors, logs, screenshots, or transaction IDs if useful. Redact secrets.
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, Node version, npm version, browser, wallet, and Stellar network.
      placeholder: "Windows 11, Node 20, npm 10, Chrome, Freighter testnet"
    validations:
      required: true
  - type: checkboxes
    id: confirmation
    attributes:
      label: Pre-submit checklist
      options:
        - label: I included required labels/area selections above.
          required: true
        - label: I included repository-relative file paths.
          required: true
        - label: I included clean-clone setup and reproduction steps.
          required: true
        - label: I removed or redacted all secrets, service-role keys, Pinata JWTs, and Stellar secret keys.
          required: true
